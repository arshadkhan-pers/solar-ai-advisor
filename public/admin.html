<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Solar AI Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f5f7fb;
    }
  </style>
</head>

<body class="min-h-screen text-gray-800">

  <!-- HEADER -->
  <div class="bg-slate-900 text-white px-6 py-4 shadow-lg">

    <div class="flex items-center justify-between">

      <div>
        <h1 class="text-2xl font-bold">
          Solar AI Admin Dashboard
        </h1>

        <p class="text-sm text-slate-300 mt-1">
          Internal Lead Operations
        </p>
      </div>

      <div class="text-right text-sm">
        <p id="totalLeadsCount">0 Leads</p>
      </div>

    </div>

  </div>

  <!-- METRICS -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-4 p-6">

    <div class="bg-white rounded-2xl shadow p-4">
      <p class="text-sm text-gray-500">New</p>
      <h2 id="newCount" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-white rounded-2xl shadow p-4">
      <p class="text-sm text-gray-500">Hot Leads</p>
      <h2 id="hotCount" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-white rounded-2xl shadow p-4">
      <p class="text-sm text-gray-500">Qualified</p>
      <h2 id="qualifiedCount" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-white rounded-2xl shadow p-4">
      <p class="text-sm text-gray-500">Contacted</p>
      <h2 id="contactedCount" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-white rounded-2xl shadow p-4">
      <p class="text-sm text-gray-500">Shared</p>
      <h2 id="sharedCount" class="text-3xl font-bold mt-2">0</h2>
    </div>

  </div>

  <!-- FILTERS + SEARCH + ACTIONS -->
<div class="px-6 pb-4 space-y-4">

  <!-- TOP ROW -->
  <div class="flex flex-wrap gap-3 items-center">

    <button
      onclick="filterLeads('ALL')"
      class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm">
      All
    </button>

    <button
      onclick="filterLeads('NEW')"
      class="bg-white border px-4 py-2 rounded-xl text-sm">
      New
    </button>

    <button
      onclick="filterLeads('CONTACTED')"
      class="bg-white border px-4 py-2 rounded-xl text-sm">
      Contacted
    </button>

    <button
      onclick="filterLeads('SHARED')"
      class="bg-white border px-4 py-2 rounded-xl text-sm">
      Shared
    </button>

    <button
      onclick="filterLeads('Hot')"
      class="bg-red-100 text-red-700 px-4 py-2 rounded-xl text-sm">
      Hot Leads
    </button>

  </div>

  <!-- SEARCH + BULK ACTIONS -->
  <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">

    <input
      id="leadSearchInput"
      type="text"
      placeholder="Search by name, phone, city or lead code..."
      oninput="searchLeads()"
      class="w-full md:w-[400px] border border-slate-300 rounded-xl px-4 py-3 text-sm"
    >

    <div class="flex gap-2">

      <button
        onclick="shareSelectedLeadsWhatsApp()"
        class="bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-xl text-sm font-medium">
        Share WhatsApp
      </button>

      <button
        onclick="downloadSelectedLeadsCSV()"
        class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded-xl text-sm font-medium">
        Export CSV
      </button>

    </div>

  </div>

</div>

  <!-- TABLE -->
  <div class="px-6 pb-10">

    <div class="bg-white rounded-2xl shadow overflow-hidden">

      <div class="overflow-x-auto">

        <table class="w-full text-sm">

          <thead class="bg-slate-100 text-slate-700">

            <tr>
              <tr>

  <th class="text-left px-4 py-3">
    <input
      type="checkbox"
      onchange="toggleSelectAll(this.checked)"
    >
  </th>

              <th class="text-left px-4 py-3">Lead</th>
              <th class="text-left px-4 py-3">City</th>
              <th class="text-left px-4 py-3">Bill</th>
              <th class="text-left px-4 py-3">Type</th>
              <th class="text-left px-4 py-3">Stage</th>
              <th class="text-left px-4 py-3">Status</th>
              <th class="text-left px-4 py-3">Action</th>
            </tr>

          </thead>

          <tbody id="leadsTableBody">
          </tbody>

        </table>

</div>

<!-- PAGINATION -->
<div class="flex items-center justify-between px-6 py-4 border-t bg-slate-50">

  <button
    id="prevPageBtn"
    onclick="loadPreviousPage()"
    class="bg-white border px-4 py-2 rounded-xl text-sm disabled:opacity-40">
    Previous
  </button>

  <p
    id="paginationInfo"
    class="text-sm text-slate-500">
    Showing latest leads
  </p>

  <button
    id="nextPageBtn"
    onclick="loadNextPage()"
    class="bg-white border px-4 py-2 rounded-xl text-sm">
    Next
  </button>

</div>

</div>

</div>

<!-- ===================================== -->
<!-- LEAD DETAILS PANEL -->
<!-- ===================================== -->

<div
  id="leadPanelOverlay"
  class="hidden fixed inset-0 bg-black/40 z-40"
  onclick="closeLeadPanel()"
></div>

<div
  id="leadDetailsPanel"
  class="fixed top-0 right-0 w-full md:w-[520px] h-full bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto"
>

  <!-- HEADER -->
  <div class="sticky top-0 bg-slate-900 text-white px-5 py-4 flex items-center justify-between border-b border-slate-800 z-10 shadow-sm">
  <div class="flex items-center gap-3">
    <button 
      onclick="closeLeadPanel()" 
      class="hover:bg-slate-800 text-slate-300 hover:text-white p-2 rounded-xl transition-all duration-150 flex items-center justify-center border border-transparent hover:border-slate-700 active:scale-95"
      title="Go Back"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
    </button>
    
    <div>
      <h2 class="text-lg font-bold tracking-tight">
        Lead Details
      </h2>
      <p
        id="panelLeadCode"
        class="text-xs text-indigo-400 font-mono mt-0.5"
      ></p>
    </div>
  </div>

  <button
    onclick="closeLeadPanel()"
    class="text-slate-400 hover:text-white text-xl p-1 hover:bg-slate-800 rounded-lg transition-colors leading-none"
  >
    &times;
  </button>
</div>

<!-- CONTENT -->
<div
  id="leadPanelContent"
  class="p-6 space-y-6"
>
  <div class="text-center py-10 text-slate-500">
    Loading lead details...
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
