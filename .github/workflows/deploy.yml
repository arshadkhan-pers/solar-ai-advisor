name: Deploy to Firebase
on:
  push:
    branches:
      - main
    paths:
      - 'functions/**' # 👈 This is the "Filter"
      - '.github/workflows/deploy.yml' # Also trigger if the workflow itself  changes
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install Dependencies
        run: cd functions && npm install
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --force
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }} # 👈 Updated from FIREBASE_TOKEN
          PROJECT_ID: solar-ai-advisor-6e70c # 👈 Added explicit project binding
