<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Solar AI Admin Login</title>
<script src="../js/console-shield.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h1 class="text-2xl font-bold text-slate-900 mb-2">
      Solar AI Admin
    </h1>

    <p class="text-sm text-slate-500 mb-6">
      Secure Admin Login
    </p>

    <input
      id="email"
      type="email"
      placeholder="Email"
      class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-4"
    />

    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-4"
    />

    <button
      onclick="login()"
      class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-semibold"
    >
      Login
    </button>

    <p
      id="loginError"
      class="text-red-600 text-sm mt-4 hidden"
    >
    </p>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="../js/firebase-init.js"></script>

  <script src="../js/auth.js"></script>

</body>

</html>
